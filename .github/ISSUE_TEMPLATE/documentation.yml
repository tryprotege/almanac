name: 📚 Documentation
description: Report documentation issues or suggest improvements
title: '[Docs]: '
labels: ['documentation', 'needs-triage']
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve our documentation! Clear docs help everyone.

  - type: checkboxes
    id: prerequisites
    attributes:
      label: Prerequisites
      description: Please confirm the following
      options:
        - label: I have searched existing issues for similar documentation requests
          required: true
        - label: I have checked the latest documentation
          required: true

  - type: dropdown
    id: type
    attributes:
      label: Documentation Type
      description: What type of documentation issue is this?
      options:
        - Missing Documentation
        - Incorrect/Outdated Documentation
        - Unclear/Confusing Documentation
        - Typo/Grammar Issue
        - Code Example Issue
        - Documentation Enhancement
        - New Tutorial/Guide Needed
        - API Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: location
    attributes:
      label: Documentation Location
      description: Where in the documentation is this issue? (provide URL or file path)
      placeholder: |
        - URL: https://docs.example.com/...
        - File: docs/getting-started/installation.md
        - Section: "Configuration" section
    validations:
      required: true

  - type: textarea
    id: issue
    attributes:
      label: Issue Description
      description: Describe the documentation issue or what's missing
      placeholder: What's wrong with the current documentation or what's missing?
    validations:
      required: true

  - type: textarea
    id: suggestion
    attributes:
      label: Suggested Improvement
      description: How should the documentation be improved?
      placeholder: |
        What would you like to see documented?
        How should it be explained?
        What examples would be helpful?
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other relevant information
      placeholder: |
        - Related code: [link to code]
        - User perspective: beginner/advanced
        - Use case context

  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      description: Would you like to contribute this documentation?
      options:
        - label: I would like to work on this documentation update
          required: false
