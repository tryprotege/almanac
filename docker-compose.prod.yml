services:
  mongodb:
    image: mongo:8.2.2
    container_name: almanac_mongodb_prod
    ports:
      - "27017:27017"
    volumes:
      - ./data/mongodb:/data/db
      - ./data/mongodb-config:/data/configdb
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=admin123
    restart: unless-stopped
    networks:
      - almanac-network

  qdrant:
    image: qdrant/qdrant:v1.16.0
    container_name: almanac_qdrant_prod
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./data/qdrant:/qdrant/storage
    restart: unless-stopped
    networks:
      - almanac-network

  memgraph:
    image: memgraph/memgraph:3.7.0
    container_name: almanac_memgraph_prod
    ports:
      - "7687:7687"
      - "7444:7444"
    volumes:
      - ./data/memgraph:/var/lib/memgraph
    environment:
      - MEMGRAPH_LOG_LEVEL=WARNING
    restart: unless-stopped
    networks:
      - almanac-network

  redis:
    image: redis:alpine3.22
    container_name: almanac_redis_prod
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data
    command: redis-server --appendonly yes
    restart: unless-stopped
    networks:
      - almanac-network

  server:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
      target: production
    container_name: almanac_server_prod
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - MONGO_HOST=mongodb
      - MONGO_PORT=27017
      - MONGO_USERNAME=admin
      - MONGO_PASSWORD=admin123
      - MONGO_DB_NAME=ebee
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=
      - REDIS_DB=0
      - MEMGRAPH_HOST=memgraph
      - MEMGRAPH_PORT=7687
      - MEMGRAPH_USERNAME=
      - MEMGRAPH_PASSWORD=
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - QDRANT_API_KEY=
    env_file:
      - packages/server/.env
    depends_on:
      - mongodb
      - qdrant
      - memgraph
      - redis
    restart: unless-stopped
    networks:
      - almanac-network

  client:
    build:
      context: .
      dockerfile: packages/client/Dockerfile
      target: production
    container_name: almanac_client_prod
    ports:
      - "80:80"
    depends_on:
      - server
    restart: unless-stopped
    networks:
      - almanac-network

networks:
  almanac-network:
    driver: bridge
