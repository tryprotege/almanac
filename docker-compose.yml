version: "3.8"

services:
  mongodb:
    image: mongo:8.2.2
    container_name: ebee_mongodb
    ports:
      - "27017:27017"
    volumes:
      - ./.data/mongodb:/data/db
      - ./.data/mongodb-config:/data/configdb
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=admin123
    restart: unless-stopped
    networks:
      - ebee-network

  qdrant:
    image: qdrant/qdrant:v1.16.0
    container_name: ebee_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./.data/qdrant:/qdrant/storage
    restart: unless-stopped
    networks:
      - ebee-network

  memgraph:
    image: memgraph/memgraph:3.7.0
    container_name: ebee_memgraph
    ports:
      - "7687:7687"
      - "7444:7444"
    volumes:
      - ./.data/memgraph:/var/lib/memgraph
    environment:
      - MEMGRAPH_LOG_LEVEL=WARNING
    restart: unless-stopped
    networks:
      - ebee-network

  redis:
    image: redis:alpine3.22
    container_name: ebee_redis
    ports:
      - "6379:6379"
    volumes:
      - ./.data/redis:/data
    command: redis-server --appendonly yes
    restart: unless-stopped
    networks:
      - ebee-network

  server:
    profiles: ["app"] # <-- only start when profile enabled
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    container_name: ebee_server
    ports:
      - "3000:3000"
    volumes:
      - ./packages/server:/app/packages/server
    environment:
      - NODE_ENV=development
      - MONGO_HOST=mongodb
      - MONGO_PORT=27017
      - MONGO_USERNAME=admin
      - MONGO_PASSWORD=admin123
      - MONGO_DB_NAME=ebee
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=
      - REDIS_DB=0
      - MEMGRAPH_HOST=memgraph
      - MEMGRAPH_PORT=7687
      - MEMGRAPH_USERNAME=admin
      - MEMGRAPH_PASSWORD=
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - QDRANT_API_KEY=
    env_file:
      - packages/server/.env
    depends_on:
      - mongodb
      - qdrant
      - memgraph
      - redis
    restart: unless-stopped
    networks:
      - ebee-network
    command: pnpm --filter server run dev

  client:
    profiles: ["app"] # <-- only start when profile enabled
    build:
      context: .
      dockerfile: packages/client/Dockerfile
    container_name: ebee_client
    ports:
      - "5173:5173"
    volumes:
      - ./packages/client:/app/packages/client
    environment:
      - NODE_ENV=development
      - VITE_API_TARGET=http://server:3000
    restart: unless-stopped
    networks:
      - ebee-network
    command: pnpm --filter client run dev -- --host 0.0.0.0

networks:
  ebee-network:
    driver: bridge
