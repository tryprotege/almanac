# Agent Comparison Benchmark Configuration
name: "AI Agent Comparison"
description: "Compare different AI agents using eBee unified search"
type: agent
iterations: 5
warmupRuns: 1
outputDir: "./benchmark-results/agent-comparison"

agents:
  - name: claude
    model: claude-3-5-sonnet-20241022
    apiKey: ${ANTHROPIC_API_KEY}
    systemPrompt: "You are a helpful AI assistant with access to eBee unified search."

  - name: roo-code
    model: claude-3-5-sonnet-20241022
    apiKey: ${ANTHROPIC_API_KEY}
    systemPrompt: "You are Roo, a skilled software engineer with access to eBee search."

queries:
  - id: "multi_source_query"
    query: "Find all Notion pages about Q4 roadmap and related Slack discussions"
    category: "exploratory"

  - id: "technical_query"
    query: "What are the current authentication issues mentioned in GitHub?"
    category: "entity_focused"

  - id: "analytics_query"
    query: "Show me the top performing pages from Fathom analytics last week"
    category: "aggregation"

  - id: "integration_query"
    query: "How do our Stripe payments integrate with Notion invoicing?"
    category: "relationship"

evalCriteria:
  metrics:
    - response_quality
    - answer_completeness
    - factual_accuracy
    - reasoning_depth
    - token_efficiency
  judgeModel: claude-3-5-sonnet-20241022
